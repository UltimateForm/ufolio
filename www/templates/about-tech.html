{{ define "about-tech" }}
<div
    class="window"
    id="about-tech-window"
    style="top: 10%; left: 30%"
    aria-hidden="true"
    tabindex="-1"
>
    <div class="title-bar">
        <div class="title-bar-text">about tech</div>
        {{ template "window-controls" }}
    </div>
    <div class="window-body">
        <ul
            class="tree-view"
            aria-selected="technical experience"
            role="radiogroup"
            aria-label="list of skills"
        >
            <li>
                <button aria-checked="true" data-key="technical experience">
                    technical experience
                </button>
            </li>
            {{ template "tree" .Tech }}
        </ul>
        {{ .TechSkillsHtml }}
    </div>
</div>
{{ end }}
